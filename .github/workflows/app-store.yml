name: Build and Upload to App Store

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 1.2.0)'
        required: true
        default: '1.0.0'

env:
  APP_NAME: DoctorAddressVerifier
  BUNDLE_ID: com.membra.doctor-address-verifier

jobs:
  build:
    runs-on: macos-latest
    env:
      VERSION: 1.0.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          fi

      - name: Setup signing keychain
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 1200 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productbuild: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -s build.keychain login.keychain

      - name: Build release binary
        run: swift build -c release

      - name: Package .app bundle
        run: |
          BINARY=".build/release/$APP_NAME"
          APP_DIR=".build/release/$APP_NAME.app"
          CONTENTS="$APP_DIR/Contents"
          MACOS="$CONTENTS/MacOS"
          RESOURCES="$CONTENTS/Resources"

          rm -rf "$APP_DIR"
          mkdir -p "$MACOS" "$RESOURCES"

          cp "$BINARY" "$MACOS/$APP_NAME"
          chmod +x "$MACOS/$APP_NAME"

          cat > "$CONTENTS/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>$APP_NAME</string>
              <key>CFBundleIdentifier</key>
              <string>$BUNDLE_ID</string>
              <key>CFBundleName</key>
              <string>Doctor Address Verifier</string>
              <key>CFBundleDisplayName</key>
              <string>Doctor Address Verifier</string>
              <key>CFBundleShortVersionString</key>
              <string>$VERSION</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSMinimumSystemVersion</key>
              <string>13.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Sign .app
        run: |
          codesign --force --deep --options runtime \
            --entitlements DoctorAddressVerifier.entitlements \
            --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" \
            ".build/release/$APP_NAME.app"

      - name: Build .pkg for App Store
        run: |
          productbuild --component ".build/release/$APP_NAME.app" /Applications \
            --sign "${{ secrets.APPLE_INSTALLER_IDENTITY }}" \
            --product "DoctorAddressVerifier.entitlements" \
            ".build/release/$APP_NAME-$VERSION.pkg"

      - name: Upload to App Store Connect
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun altool --upload-app --type macos \
            --file ".build/release/$APP_NAME-$VERSION.pkg" \
            --username "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION }}
          path: .build/release/${{ env.APP_NAME }}-${{ env.VERSION }}.pkg
